            };


            // السجل والتقارير
            const TransactionsView = () => {
                const [timeFilter, setTimeFilter] = useState('day');
                const [dateFrom, setDateFrom] = useState("");
                const [dateTo, setDateTo] = useState("");
                const [typeFilter, setTypeFilter] = useState('sale');
                const [search, setSearch] = useState("");
                
                const handleReturn = (trans) => {
                    if(!confirm("استرجاع العملية؟")) return;
                    const retInv = inventory.map(item => item.id === trans.itemId ? { ...item, stock: Number(item.stock) + Number(trans.qty) } : item);
                    setInventory(retInv);
                    const retItem = retInv.find(i => i.id === trans.itemId);
                    if(retItem) saveItemToCloud('inventory', retItem);
                    if(trans.customerId) {
                        const retCusts = customers.map(cust => cust.id === trans.customerId ? { ...cust, balance: cust.balance - trans.totalPrice } : cust);
                        setCustomers(retCusts);
                        const retCust = retCusts.find(c => c.id === trans.customerId);
                        if(retCust) saveItemToCloud('customers', retCust);
                    };
                    setTransactions(transactions.map(t => t.id === trans.id ? { ...t, status: 'returned' } : t));
                    saveItemToCloud('transactions', { ...trans, status: 'returned' });
                    notify("تم الاسترجاع");
                };

                const getFiltered = () => {
                    let res = transactions;
                    if (dateFrom && dateTo) {
                        const start = new Date(dateFrom).setHours(0,0,0,0);
                        const end   = new Date(dateTo).setHours(23,59,59,999);
                        res = res.filter(t => t.timestamp >= start && t.timestamp <= end);
                    } else if (timeFilter !== 'all') {
                        const now   = Date.now();
                        const today = new Date(); today.setHours(0,0,0,0);
                        if (timeFilter === 'day') {
                            res = res.filter(t => new Date(t.timestamp).toDateString() === today.toDateString());
                        } else if (timeFilter === 'yesterday') {
                            const yest = new Date(today); yest.setDate(yest.getDate() - 1);
                            const yestEnd = new Date(yest); yestEnd.setHours(23,59,59,999);
                            res = res.filter(t => t.timestamp >= yest.getTime() && t.timestamp <= yestEnd.getTime());
                        } else if (timeFilter === 'week') {
                            res = res.filter(t => (now - t.timestamp) < 7*24*60*60*1000);
                        } else if (timeFilter === 'month') {
                            res = res.filter(t => (now - t.timestamp) < 30*24*60*60*1000);
                        }
                    }
                    if (typeFilter !== 'all') res = res.filter(t => typeFilter === 'returned' ? t.status === 'returned' : (t.type === typeFilter && t.status !== 'returned'));
                    if (search) res = res.filter(t => (t.date||'').includes(search) || (t.customerName||'').includes(search) || (t.itemName||'').includes(search));
                    return res;
                };
                
                const filtered = getFiltered();
                const validSales = filtered.filter(t => t.type === 'sale' && t.status !== 'returned');
                const returnedTrans = filtered.filter(t => t.status === 'returned');

                const salesVolume = validSales.reduce((a, b) => a + (Number(b.totalPrice)||0), 0);
                const totalCash = validSales.reduce((a, b) => a + (Number(b.cashPaid)||0), 0);
                const totalCard = validSales.reduce((a, b) => a + (Number(b.cardPaid)||0), 0);
                const itemsSold = validSales.reduce((a, b) => a + (Number(b.qty)||0), 0);
                const salesProfit = validSales.reduce((a, b) => a + ((Number(b.sellPrice)||0) - (Number(b.buyPrice)||0)) * (Number(b.qty)||0), 0);
                const scrapProfit = filtered.filter(t => t.status !== 'returned').reduce((a, b) => a + (Number(b.scrapValue)||0), 0);
                const totalReturned = returnedTrans.reduce((a, b) => a + (Number(b.totalPrice)||0), 0);
                const returnedCount = returnedTrans.length;
                const netIncome = salesProfit + scrapProfit;
                const grossTotal = salesVolume + scrapProfit;

                const stats = { salesVolume, totalCash, totalCard, itemsSold, salesProfit, scrapProfit, netIncome, grossTotal, totalReturned, returnedCount };

                return (
                    <div className="space-y-6">
                        <div className="flex flex-col gap-6">
                            <div className="flex justify-between items-center">
                                <h2 className="text-2xl font-black text-slate-800">السجل العام</h2>
                                <div className="flex gap-2 flex-wrap">
                                    <button onClick={() => {
                                        const itemNames = [...new Set(filtered.filter(t => t.itemName).map(t => t.itemName))];
                                        const content = 'أسماء الأصناف - السجل\n' + new Date().toLocaleDateString('ar-SA') + '\n' + '='.repeat(30) + '\n' + itemNames.join('\n');
                                        const blob = new Blob(['\ufeff' + content], { type: 'text/plain;charset=utf-8' });
                                        const url = URL.createObjectURL(blob);
                                        const a = document.createElement('a');
                                        a.href = url; a.download = `أسماء_الأصناف_السجل_${new Date().toISOString().slice(0,10)}.txt`;

            // المشتريات
            const PurchasesView = () => {
                const [viewMode, setViewMode] = useState('new');
                const [supplier, setSupplier] = useState("");
                const [invNo, setInvNo] = useState("");
                const [cart, setCart] = useState([]);
                const [search, setSearch] = useState("");
                const [showRes, setShowRes] = useState(false);
                const [itemInputs, setItemInputs] = useState({ id: "", name: "", cost: 0, qty: 1 });
                
                const [historySearch, setHistorySearch] = useState("");
                const [pDateFrom, setPDateFrom] = useState("");
                const [pDateTo, setPDateTo] = useState("");
                const [pPeriod, setPPeriod] = useState("all");

                // الأرشيف يعتمد على purchaseInvoices المحفوظة كوحدات كاملة
                // مع fallback للفواتير القديمة المحفوظة في transactions
                const invoices = useMemo(() => {
                    const newInvoices = purchaseInvoices || [];
                    const newInvoiceKeys = new Set(newInvoices.map(inv => inv.invoiceKey));
                    const groups = {};
                    transactions.filter(t => t.type === 'supply').forEach(t => {
                        const groupKey = t.invoiceNo ? `inv_${t.invoiceNo}` : `old_${t.id}`;
                        if (newInvoiceKeys.has(groupKey)) return;
                        if(!groups[groupKey]) {
                            groups[groupKey] = {
                                invoiceKey: groupKey,
                                invoiceNo: t.invoiceNo || "سجل سابق",
                                supplierName: t.customerName || "مورد غير محدد",
                                date: t.date,
                                timestamp: t.timestamp,
                                items: [],
                                total: 0
                            };
                        }
                        groups[groupKey].items.push({
                            id: t.id, itemId: t.itemId, itemName: t.itemName,
                            name: t.itemName, qty: t.qty, cost: t.buyPrice,
                            buyPrice: t.buyPrice, total: t.totalPrice
                        });
                        groups[groupKey].total += (Number(t.totalPrice) || 0);
                    });
                    const oldInvoices = Object.values(groups);
                    return [...newInvoices, ...oldInvoices].sort((a,b) => b.timestamp - a.timestamp);
                }, [purchaseInvoices, transactions]);

                const filteredInvoices = invoices.filter(inv => {
                    const matchSearch = inv.invoiceNo.includes(historySearch) || inv.supplierName.includes(historySearch);
                    
                    let matchDate = true;
                    if (pDateFrom && pDateTo) {
                        const start = new Date(pDateFrom).setHours(0,0,0,0);
                        const end = new Date(pDateTo).setHours(23,59,59,999);
                        matchDate = inv.timestamp >= start && inv.timestamp <= end;
                    } else if (pPeriod !== 'all') {
                        const now = Date.now();
                        const today = new Date().setHours(0,0,0,0);
                        if (pPeriod === 'day') matchDate = new Date(inv.timestamp).setHours(0,0,0,0) === today;
                        else if (pPeriod === 'week') matchDate = (now - inv.timestamp) < 7*24*60*60*1000;
                        else if (pPeriod === 'month') matchDate = (now - inv.timestamp) < 30*24*60*60*1000;
                    }

                    return matchSearch && matchDate;
                });

                const stats = {
                    count: filteredInvoices.length,
                    totalCost: filteredInvoices.reduce((a,b)=>a+b.total,0),
                    totalItems: filteredInvoices.reduce((a,b)=>a+b.items.length,0),
                    avg: filteredInvoices.length > 0 ? (filteredInvoices.reduce((a,b)=>a+b.total,0) / filteredInvoices.length) : 0
                };

                const addItemToCart = () => { 
                    if (!itemInputs.id) return notify("اختر صنفاً أولاً"); 
                    setCart([...cart, { ...itemInputs, total: itemInputs.cost * itemInputs.qty }]); 
                    setItemInputs({ id: "", name: "", cost: 0, qty: 1 }); 
                    setSearch(""); 
                };

                const saveInvoice = () => {
                    if (cart.length === 0) return notify("الفاتورة فارغة");
                    const date = new Date().toLocaleString('en-US');
                    const ts = Date.now();
                    const invoiceTotal = cart.reduce((a, b) => a + b.total, 0);
                    const finalInvNo = invNo || ("PUR-" + ts);
                    const invoiceKey = "inv_" + finalInvNo;

                    // تحديث المخزن وتسجيل transactions
                    let newInv = [...inventory];
                    let newTrans = [];
                    cart.forEach(cartItem => {
                        newInv = newInv.map(i => i.id === cartItem.id ? { ...i, stock: Number(i.stock) + Number(cartItem.qty), buyPrice: Number(cartItem.cost) } : i);
                        newTrans.push({
                            id: ts + Math.random(),
                            type: 'supply',
                            date: date,
                            timestamp: ts,
                            customerName: supplier || "مورد خارجي",
                            itemName: cartItem.name,
                            itemId: cartItem.id,
                            qty: Number(cartItem.qty),
                            buyPrice: Number(cartItem.cost),
                            totalPrice: cartItem.total,
                            invoiceNo: finalInvNo
                        });
                    });

                    // حفظ الفاتورة كوحدة كاملة في purchaseInvoices
                    const fullInvoice = {
                        invoiceKey: invoiceKey,
                        invoiceNo: finalInvNo,
                        supplierName: supplier || "مورد خارجي",
                        date: date,
                        timestamp: ts,
                        total: invoiceTotal,
                        items: cart.map(cartItem => ({
                            id: ts + Math.random(),
                            itemId: cartItem.id,
                            itemName: cartItem.name,
                            name: cartItem.name,
                            qty: Number(cartItem.qty),
                            cost: Number(cartItem.cost),
                            buyPrice: Number(cartItem.cost),
                            total: cartItem.total
                        }))
                    };

                    setInventory(newInv);
                    setTransactions([...newTrans, ...transactions]);
                    setPurchaseInvoices([fullInvoice, ...purchaseInvoices]);
                    // ☁️ حفظ فوري لفاتورة الشراء
                    saveItemToCloud('purchaseInvoices', fullInvoice);
                    newTrans.forEach(t => saveItemToCloud('transactions', t));
                    newInv.forEach(i => saveItemToCloud('inventory', i));
                    notify("تم حفظ فاتورة المشتريات بنجاح ✓");
                    handlePrint(fullInvoice, 'purchase_invoice');
                    setCart([]);
                    setSupplier("");
                    setInvNo("");
                };

                const saveAsPDF = () => {
                    if (cart.length > 0) {
                        handlePDF({
                            invoiceNo: invNo || "مسودة",
                            supplierName: supplier || "مسودة",
                            date: new Date().toLocaleString('en-US'),
                            items: cart.map(c => ({...c, itemName: c.name, name: c.name})),
                            total: cart.reduce((a, b) => a + b.total, 0),
                            timestamp: Date.now()
                        }, 'purchase_invoice');
                    } else {
                        notify("أضف أصنافاً أولاً للمعاينة", "info");
                    }
                };
                
                return (
                    <div className="h-full flex flex-col">
                        <div className="flex gap-4 mb-6">
                            <button onClick={() => setViewMode('new')} className={`px-6 py-3 rounded-xl font-bold transition-all flex items-center gap-2 ${viewMode === 'new' ? 'bg-slate-900 text-white shadow-lg' : 'bg-white text-slate-500 hover:bg-white/10'}`}><i className="ph ph-plus-circle"></i> تسجيل فاتورة جديدة</button>
                            <button onClick={() => setViewMode('history')} className={`px-6 py-3 rounded-xl font-bold transition-all flex items-center gap-2 ${viewMode === 'history' ? 'bg-slate-900 text-white shadow-lg' : 'bg-white text-slate-500 hover:bg-white/10'}`}><i className="ph ph-archive"></i> أرشيف الفواتير</button>
                        </div>

                        {viewMode === 'new' ? (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 h-full">
                                <div className="lg:col-span-2 space-y-6">
                                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex gap-4 items-end">
                                        <div className="flex-1"><label className="input-label">المورد</label><input type="text" className="input-field" value={supplier} onChange={e => setSupplier(e.target.value)} placeholder="اسم المورد" /></div>
                                        <div className="flex-1"><label className="input-label">رقم الفاتورة</label><input type="text" className="input-field" value={invNo} onChange={e => setInvNo(e.target.value)} placeholder="رقم مرجعي" /></div>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                        <h3 className="font-bold text-slate-800 mb-4 border-b pb-2">إضافة أصناف</h3>
                                        <div className="grid grid-cols-4 gap-4 items-end">
                                            <div className="col-span-2 relative">
                                                <label className="input-label">بحث</label>
                                                <input type="text" className="input-field" placeholder="ابحث..." value={search} onChange={e => { setSearch(e.target.value); setShowRes(true); }} />
                                                {showRes && search && (
                                                    <div className="absolute z-10 w-full rounded-xl max-h-48 overflow-y-auto mt-1 custom-scroll" style={{background:'#1a2a4a',border:'1px solid rgba(99,165,255,0.35)',boxShadow:'0 12px 40px rgba(0,0,0,0.5)'}}>
                                                        {inventory.filter(i => i.name.includes(search)).map(i => (
                                                            <div key={i.id} className="p-3 cursor-pointer transition-colors" style={{borderBottom:'1px solid rgba(255,255,255,0.06)'}}
                                                                onMouseEnter={e=>e.currentTarget.style.background='rgba(99,165,255,0.18)'}
                                                                onMouseLeave={e=>e.currentTarget.style.background='transparent'}
                                                                onClick={() => { setItemInputs({ id: i.id, name: i.name, cost: i.buyPrice, qty: 1 }); setSearch(i.name); setShowRes(false); }}>
                                                                <span className="font-bold" style={{color:'rgba(255,255,255,0.9)'}}>{i.name}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                            <div><label className="input-label">التكلفة</label><input type="number" className="input-field" value={itemInputs.cost} onChange={e => setItemInputs({...itemInputs, cost: Number(e.target.value)})} /></div>
                                            <div><label className="input-label">الكمية</label><input type="number" className="input-field" value={itemInputs.qty} onChange={e => setItemInputs({...itemInputs, qty: Number(e.target.value)})} /></div>
                                        </div>
                                        <button onClick={addItemToCart} className="mt-4 w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700">إضافة</button>
                                    </div>
                                    <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">

                    if (invFilter === "high")     return [...baseFiltered].sort((a,b) => Number(b.stock) - Number(a.stock));

            // ==================== إدارة المستخدمين والفروع ====================
            const UsersManagementView = () => {
                const [users, setUsers] = useState([]);
                const [loading, setLoading] = useState(true);
                const [tab, setTab] = useState('users'); // users | branches
                const [showAddUser, setShowAddUser] = useState(false);
                const [showAddBranch, setShowAddBranch] = useState(false);
                const [newUser, setNewUser] = useState({ name:'', email:'', password:'', role:'employee', branches:[] });
                const [newBranch, setNewBranch] = useState({ name:'', address:'' });
                const [branches, setBranches] = useState([...allBranches]);
                const [saving, setSaving] = useState(false);
                const [msg, setMsg] = useState('');

                useEffect(() => {
                    loadUsers();
                    loadAllBranches();
                }, []);

                const loadUsers = async () => {
                    if (!window.firebaseDB) return;
                    try {
                        // المستخدمين في users collection مباشرة (كما يحفظهم الأدمن)
                        const { collection, getDocs } = window.firebaseModules;
                        const snap = await getDocs(collection(window.firebaseDB, 'users'));
                        setUsers(snap.docs.map(d => ({ uid: d.id, ...d.data() })) || []);
                    } catch { setUsers([]); }
                    finally { setLoading(false); }
                };

                const loadAllBranches = async () => {
                    if (!window.firebaseDB) return;
                    try {
                        // الفروع في branches collection مباشرة (كما يحفظها الأدمن)
                        const { collection, getDocs } = window.firebaseModules;
                        const snap = await getDocs(collection(window.firebaseDB, 'branches'));
                        setBranches(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    } catch {}
                };

                const addBranch = async () => {
                    if (!newBranch.name) { setMsg('أدخل اسم الفرع'); return; }
                    setSaving(true);
                    // الأدمن يستخدم addDoc في branches collection مباشرة
                    const { collection, addDoc } = window.firebaseModules;
                    const branchRef = await addDoc(collection(window.firebaseDB, 'branches'), {
                        name: newBranch.name,
                        address: newBranch.address || '',
                        city: newBranch.city || '',
                        status: 'active',
                        createdAt: Date.now()
                    });
                    const id = branchRef.id;
                    const branch = { id, name: newBranch.name, address: newBranch.address, status: 'active' };
                    // إنشاء مجموعات الفرع الأولية
                    const initRecord = [{ id: '_init', _init: true, _branchId: id }];
                    await Promise.all([
                        CloudManager.saveCollection(id, 'inventory', initRecord),
                        CloudManager.saveCollection(id, 'customers', initRecord),
                        CloudManager.saveCollection(id, 'transactions', initRecord),
                        CloudManager.saveCollection(id, 'expenses', initRecord),
                        CloudManager.saveCollection(id, 'settings', [{id:'main', shopName: newBranch.name, _branchId: id}]),
                    ]);
                    setBranches([...branches, branch]);
                    setAllBranches([...allBranches, branch]);
                    setNewBranch({ name:'', address:'' });
                    setShowAddBranch(false);
                    setMsg('✅ تم إنشاء الفرع: ' + branch.name);
                    setSaving(false);
                };

                const addUser = async () => {
                    if (!newUser.email || !newUser.password || !newUser.name) { setMsg('أكمل جميع الحقول'); return; }
                    setSaving(true);
                    const result = await UserManager.createUser(newUser.email, newUser.password, {
                        name: newUser.name, 
                        role: newUser.role, 
                        // الأدمن يستخدم branchId كـ string وليس مصفوفة
                        branchId: newUser.branches[0] || 'all',
                        status: 'active'
                    });
                    if (result.success) {
                        setMsg('✅ تم إنشاء الحساب: ' + newUser.email);
                        setNewUser({ name:'', email:'', password:'', role:'employee', branches:[] });
                        setShowAddUser(false);

                                                        <th className="p-2 text-center whitespace-nowrap" style={{color:'var(--text-muted)'}}>السعر</th>
                                                        <th className="p-2 text-center whitespace-nowrap" style={{color:'var(--text-muted)'}}>إجمالي العملية</th>
                                                        <th className="p-2 text-center whitespace-nowrap" style={{color:'var(--text-muted)'}}>المدفوع</th>
                                                        <th className="p-2 text-center whitespace-nowrap" style={{color:'var(--text-muted)'}}>الآجل</th>
                                                        <th className="p-2 text-center whitespace-nowrap" style={{color:'var(--text-muted)'}}>الرصيد التراكمي</th>
                                                        <th className="p-2 text-center whitespace-nowrap" style={{color:'var(--text-muted)'}}>النوع</th>
                                                        <th className="p-2 text-center whitespace-nowrap" style={{color:'var(--text-muted)'}}>تعديل</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {sortedTransactions.length === 0 ? (
                                                        <tr>
                                                            <td colSpan="11" className="p-8 text-center" style={{color:'var(--text-muted)'}}>
                                                                لا توجد حركات مسجلة لهذا العميل
                                                            </td>
                                                        </tr>
                                                    ) : (() => {
                                                        let runningBalance = 0;
                                                        return sortedTransactions.map((t, idx) => {
                                                            const opTotal = Number(t.totalPrice) || Number(t.amountPaid) || 0;
                                                            let cashInOp = 0;
                                                            let deferredInOp = 0;
                                                            let balanceChange = 0;

                                                            if (t.type === 'sale' && t.status !== 'returned') {
                                                                cashInOp = Number(t.cashPaid) || (t.payMethod === 'cash' ? opTotal : t.payMethod === 'split' ? (Number(t.cashPaid)||0) : 0);
                                                                deferredInOp = opTotal - cashInOp;
                                                                balanceChange = deferredInOp;
                                                            } else if (t.type === 'payment') {
                                                                cashInOp = opTotal;
                                                                deferredInOp = 0;
                                                                balanceChange = -opTotal;
                                                            } else if (t.status === 'returned') {
                                                                balanceChange = -opTotal;
                                                            }

                                                            runningBalance += balanceChange;

                                                            const rowBg = t.status === 'returned'
                                                                ? 'rgba(239,68,68,0.08)'
                                                                : t.type === 'payment'
                                                                ? 'rgba(52,211,153,0.06)'
                                                                : 'transparent';

                                                            return (
                                                                <tr key={t.id} className="transition-all" style={{borderBottom:'1px solid rgba(255,255,255,0.06)', background: rowBg}}
                                                                    onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,0.05)'}
                                                                    onMouseLeave={e => e.currentTarget.style.background = rowBg}>
                                                                    <td className="p-2 text-center text-xs font-mono" style={{color:'var(--text-muted)'}}>{idx+1}</td>
                                                                    <td className="p-2 text-center">
                                                                        <div className="text-xs font-mono whitespace-nowrap" style={{color:'var(--text-secondary)'}}>{t.date?.split(',')[0] || '-'}</div>
                                                                    </td>
                                                                    <td className="p-2 font-bold" style={{color:'var(--text-primary)'}}>
                                                                        {t.type === 'payment'
                                                                            ? <span style={{color:'rgb(110,231,183)'}}>💰 سداد دفعة</span>
                                                                            : <span>{t.itemName || '-'}</span>}
                                                                    </td>
                                                                    <td className="p-2 text-center font-bold">
                                                                        {t.type === 'sale' && t.qty
                                                                            ? <span className="px-2 py-0.5 rounded font-black text-xs" style={{background:'rgba(99,165,255,0.2)',color:'rgb(147,197,253)'}}>{t.qty}</span>
                                                                            : <span style={{color:'var(--text-muted)'}}>-</span>}
                                                                    </td>
                                                                    <td className="p-2 text-center" style={{color:'var(--text-secondary)'}}>
                                                                        {t.type === 'sale' && t.sellPrice ? Number(t.sellPrice).toLocaleString() : '-'}
                                                                    </td>
                                                                    <td className="p-2 text-center font-black" style={{color:'var(--text-primary)'}}>
                                                                        {opTotal > 0 ? opTotal.toLocaleString() : '-'}
                                                                    </td>
                                                                    <td className="p-2 text-center">
                                                                        {cashInOp > 0
                                                                            ? <span className="px-2 py-0.5 rounded font-bold text-xs" style={{background:'rgba(52,211,153,0.18)',color:'rgb(110,231,183)'}}>{cashInOp.toLocaleString()}</span>
                                                                            : <span style={{color:'var(--text-muted)'}}>-</span>}
                                                                    </td>
                                                                    <td className="p-2 text-center">
                                                                        {t.type === 'sale' && t.status !== 'returned' && deferredInOp > 0
                                                                            ? <span className="px-2 py-0.5 rounded font-bold text-xs" style={{background:'rgba(251,146,60,0.18)',color:'rgb(253,186,116)'}}>{deferredInOp.toLocaleString()}</span>
                                                                            : t.type === 'sale'
                                                                            ? <span className="text-xs font-bold" style={{color:'rgb(110,231,183)'}}>مدفوع</span>
                                                                            : <span style={{color:'var(--text-muted)'}}>-</span>}
                                                                    </td>
                                                                    <td className="p-2 text-center">
                                                                        <span className="font-black text-base" style={{color: runningBalance > 0 ? 'rgb(252,165,165)' : runningBalance < 0 ? 'rgb(110,231,183)' : 'var(--text-muted)'}}>
                                                                            {runningBalance.toLocaleString()}
                                                                        </span>
                                                                    </td>
                                                                    <td className="p-2 text-center">
                                                                        <span className="px-2 py-1 rounded text-xs font-bold" style={
                                                                            t.type === 'sale' && t.status !== 'returned'
                                                                                ? {background:'rgba(99,165,255,0.18)',color:'rgb(147,197,253)'}
                                                                                : t.type === 'payment'
                                                                                ? {background:'rgba(52,211,153,0.18)',color:'rgb(110,231,183)'}
                                                                                : {background:'rgba(239,68,68,0.18)',color:'rgb(252,165,165)'}
                                                                        }>
                                                                            {t.type === 'sale' ? (t.status === 'returned' ? 'مرتجع' : 'بيع') : 'سداد'}
                                                                        </span>
                                                                    </td>
                                                                    <td className="p-2 text-center">
                                                                        <button
                                                                            onClick={() => setModals({...modals, editTransaction: t, viewCustomerStatement: modals.viewCustomerStatement})}
                                                                            className="px-2 py-1 rounded text-xs font-bold flex items-center gap-1 mx-auto transition-all"
                                                                            style={{background:'rgba(251,191,36,0.15)',color:'rgb(253,230,138)',border:'1px solid rgba(251,191,36,0.25)'}}
                                                                        >
                                                                            <i className="ph ph-pencil-simple"></i> تعديل
                                                                        </button>
                                                                    </td>
                                                                </tr>
                                                            );
                                                        });
                                                    })()}
                                                </tbody>
                                                <tfoot style={{background:'rgba(0,0,0,0.3)',borderTop:'2px solid rgba(255,255,255,0.12)'}}>
                                                    <tr>
                                                        <td colSpan="3" className="p-3 text-right font-black" style={{color:'var(--text-secondary)'}}>الإجماليات</td>
                                                        <td className="p-3 text-center">
                                                            <span className="px-2 py-1 rounded font-black text-xs" style={{background:'rgba(99,165,255,0.2)',color:'rgb(147,197,253)'}}>
                                                                {sortedTransactions.filter(t=>t.type==='sale'&&t.status!=='returned').reduce((a,b)=>a+(Number(b.qty)||0),0).toLocaleString()}
                                                            </span>
                                                        </td>
                                                        <td className="p-3 text-center" style={{color:'var(--text-muted)'}}>-</td>
                                                        <td className="p-3 text-center font-black" style={{color:'var(--text-primary)'}}>{stats.totalPurchases.toLocaleString()}</td>
                                                        <td className="p-3 text-center font-black" style={{color:'rgb(110,231,183)'}}>{stats.totalPayments.toLocaleString()}</td>
                                                        <td className="p-3 text-center font-black" style={{color:'rgb(253,186,116)'}}>{(stats.totalPurchases - stats.totalPayments - stats.totalReturns > 0 ? stats.totalPurchases - stats.totalPayments - stats.totalReturns : 0).toLocaleString()}</td>
                                                        <td className="p-3 text-center font-black" style={{color: stats.finalBalance > 0 ? 'rgb(252,165,165)' : 'rgb(110,231,183)'}}>{stats.finalBalance.toLocaleString()}</td>
                                                        <td colSpan="2"></td>
                                                    </tr>
                                                </tfoot>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </Modal>
                        );
                    })()}

                    {/* Modal تعديل معاملة */}
                    {modals.editTransaction && (
                        <Modal title={`تعديل: ${modals.editTransaction.itemName || (modals.editTransaction.type === 'payment' ? 'سداد' : 'معاملة')}`} onClose={() => setModals({...modals, editTransaction: null, viewCustomerStatement: modals.viewCustomerStatement})}>
                            <div className="space-y-4">
                                {/* حقل التاريخ دائماً */}
                                <div>
                                    <label className="input-label">📅 التاريخ</label>
                                    <input 
                                        type="date" 
                                        className="input-field text-center font-bold" 
                                        defaultValue={(() => {
                                            const d = modals.editTransaction.date;
                                            if (!d) return '';
                                            const parts = d.split(',')[0].split('/');
                                            if (parts.length === 3) {
                                                // Try to parse DD/MM/YYYY or MM/DD/YYYY
                                                return `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
                                            }
                                            return d.split(',')[0];
                                        })()} 
                                        id="et_date" 
                                    />
                                </div>

                                {modals.editTransaction.type === 'sale' && (
                                    <>
                                        <div><label className="input-label">اسم الصنف</label><input type="text" className="input-field" defaultValue={modals.editTransaction.itemName} id="et_item" /></div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="input-label">سعر الشراء</label><input type="number" className="input-field text-center" defaultValue={modals.editTransaction.buyPrice} id="et_buy" /></div>
                                            <div><label className="input-label">سعر البيع</label><input type="number" className="input-field text-center" defaultValue={modals.editTransaction.sellPrice} id="et_sell" /></div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="input-label">الكمية</label><input type="number" className="input-field text-center" defaultValue={modals.editTransaction.qty} id="et_qty" /></div>
                                            <div><label className="input-label">قيمة الرجيع</label><input type="number" className="input-field text-center" defaultValue={modals.editTransaction.scrapValue || 0} id="et_scrap" /></div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="input-label">المبلغ المدفوع نقداً</label>
                                                <input type="number" className="input-field text-center" defaultValue={modals.editTransaction.cashPaid || (modals.editTransaction.payMethod === 'cash' ? modals.editTransaction.totalPrice : 0)} id="et_cashpaid" />
                                            </div>
                                            <div>
                                                <label className="input-label">طريقة الدفع</label>
                                                <select className="input-field" defaultValue={modals.editTransaction.payMethod || 'deferred'} id="et_paymethod">
                                                    <option value="cash">نقدي</option>
                                                    <option value="card">بطاقة</option>
                                                    <option value="split">جزئي</option>
                                                    <option value="deferred">آجل</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div><label className="input-label">اسم العميل</label><input type="text" className="input-field" defaultValue={modals.editTransaction.customerName || ''} id="et_cname" /></div>
                                    </>
                                )}
                                {modals.editTransaction.type === 'payment' && (
                                    <div><label className="input-label">المبلغ المدفوع</label><input type="number" className="input-field text-center text-2xl font-black" defaultValue={modals.editTransaction.amountPaid} id="et_paid" /></div>
                                )}
                                <div className="p-3 rounded-xl text-sm font-bold" style={{background:'rgba(251,191,36,0.1)',border:'1px solid rgba(251,191,36,0.25)',color:'rgb(253,230,138)'}}>
                                    <i className="ph-fill ph-warning mr-1"></i>
                                    التعديل لا يؤثر على المخزون
                                </div>
                                <button onClick={() => {
                                    const t = modals.editTransaction;
                                    let updated = { ...t };
                                    
                                    // تحديث التاريخ
                                    const newDateVal = document.getElementById('et_date').value;
                                    if (newDateVal) {
                                        const [y, m, d] = newDateVal.split('-');
                                        updated.date = `${d}/${m}/${y}`;
                                        updated.timestamp = new Date(newDateVal).getTime();
                                    }

                                    if (t.type === 'sale') {
                                        const newBuy = Number(document.getElementById('et_buy').value);
                                        const newSell = Number(document.getElementById('et_sell').value);
                                        const newQty = Number(document.getElementById('et_qty').value);
                                        const newScrap = Number(document.getElementById('et_scrap').value);
                                        const newCashPaid = Number(document.getElementById('et_cashpaid').value);
                                        const newPayMethod = document.getElementById('et_paymethod').value;
                                        const newTotal = newSell * newQty;
                                        updated = { ...updated,
                                            itemName: document.getElementById('et_item').value,
                                            customerName: document.getElementById('et_cname').value,
                                            buyPrice: newBuy, sellPrice: newSell, qty: newQty,
                                            scrapValue: newScrap, totalPrice: newTotal,
                                            payMethod: newPayMethod,
                                            cashPaid: newPayMethod === 'cash' ? newTotal : newPayMethod === 'deferred' ? 0 : newCashPaid,
                                            cardPaid: newPayMethod === 'card' ? newTotal : (t.cardPaid || 0)
                                        };
                                    } else if (t.type === 'payment') {
                                        updated = { ...updated, amountPaid: Number(document.getElementById('et_paid').value) };
                                    }
                                    setTransactions(transactions.map(tr => tr.id === t.id ? updated : tr));
                                    saveItemToCloud('transactions', updated); // ☁️
                                    const prev = modals.viewCustomerStatement;
                                    setModals({...modals, editTransaction: null, viewCustomerStatement: prev});
                                    notify('تم تعديل المعاملة ✓');
                                }} className="w-full py-3 rounded-xl font-black flex items-center justify-center gap-2"
                                    style={{background:'rgba(99,165,255,0.25)',border:'1px solid rgba(99,165,255,0.4)',color:'rgb(147,197,253)'}}>
                                    <i className="ph ph-floppy-disk"></i> حفظ التعديلات
                                </button>
                            </div>
                        </Modal>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
